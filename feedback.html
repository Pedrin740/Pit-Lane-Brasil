<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback - Pit Lane Brasil</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="container">
    <h1 class="logo">Pit Lane Brasil</h1>

    <button class="hamburger" aria-label="Abrir menu">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <nav class="nav-menu">
      <a href="index.html">Home</a>
      <a href="sobre.html">Sobre</a>
      <a href="equipes.html">Equipes</a>
      <a href="contato.html">Contato</a>
      <a href="feedback.html" class="active">Feedback</a>
    </nav>
  </div>
</header>

<section class="container section">

  <h3>Compartilhe Conosco</h3>
  <p>Envie seu feedback sobre o site Pit Lane Brasil e nos ajude a melhorar!</p>

  <form action="https://formsubmit.co/pedrofelipecastrorosa@gmail.com" method="POST" class="contact-form">
    <input type="hidden" name="_subject" value="Novo Feedback - Pit Lane Brasil">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_next" value="contato.html">
    <div class="form-group">
      <label for="nome">Seu Nome:</label>
      <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
    </div>
    <div class="form-group">
      <label for="email">Seu Email:</label>
      <input type="email" id="email" name="email" placeholder="Digite seu email" required>
    </div>
    <div class="form-group">
      <label for="avaliacao">Avaliação:</label>
      <select id="avaliacao" name="avaliacao" required>
        <option value="">Selecione</option>
        <option value="Excelente">Excelente</option>
        <option value="Bom">Bom</option>
        <option value="Regular">Regular</option>
        <option value="Ruim">Ruim</option>
      </select>
    </div>
    <div class="form-group">
      <label for="mensagem">Mensagem:</label>
      <textarea id="mensagem" name="mensagem" rows="5" placeholder="Digite sua mensagem" required></textarea>
    </div>
    <button type="submit">ENVIAR FEEDBACK</button>
  </form>

</section>

<footer>
  <div class="container">
    <p>© 2026 Pit Lane Brasil</p>
  </div>
</footer>

<script>
const hamburger = document.querySelector('.hamburger');
const navMenu = document.querySelector('.nav-menu');

hamburger.addEventListener('click', () => {
  hamburger.classList.toggle('active');
  navMenu.classList.toggle('active');
});
</script>

</body>
</html>
